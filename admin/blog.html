<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Dr. Ancona Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0a1628;
      --deep:      #0d2045;
      --royal:     #1a3a6e;
      --mid:       #1e5cb3;
      --vivid:     #1a7fe8;
      --accent:    #00c6ff;
      --gold:      #e8c96a;
      --success:   #22c55e;
      --error:     #ef4444;
      --sidebar-w: 240px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #080f1e;
      color: white;
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR (igual que dashboard) ───────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--deep);
      border-right: 1px solid rgba(26,127,232,.15);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 100;
    }
    .sidebar-brand {
      padding: 1.5rem 1.25rem;
      border-bottom: 1px solid rgba(26,127,232,.12);
      display: flex; align-items: center; gap: .75rem;
    }
    .sidebar-brand-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--vivid), var(--accent));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .sidebar-brand-text strong { display: block; font-size: .88rem; color: white; }
    .sidebar-brand-text span   { color: rgba(255,255,255,.4); font-size: .72rem; }
    .sidebar-nav { flex: 1; padding: 1rem 0; overflow-y: auto; }
    .nav-section-title {
      padding: .6rem 1.25rem .3rem;
      font-size: .68rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,.25);
    }
    .nav-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem 1.25rem;
      color: rgba(255,255,255,.55);
      text-decoration: none; font-size: .88rem; font-weight: 500;
      transition: background .15s, color .15s;
    }
    .nav-item:hover { background: rgba(26,127,232,.1); color: rgba(255,255,255,.85); }
    .nav-item.is-active {
      background: rgba(26,127,232,.2); color: white;
      border-left: 3px solid var(--vivid);
    }
    .nav-item-icon { font-size: 1rem; width: 20px; text-align: center; }
    .sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(26,127,232,.12);
    }
    .user-info { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .user-avatar {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--mid), var(--vivid));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; flex-shrink: 0;
    }
    .user-name  { font-size: .82rem; font-weight: 600; color: white; }
    .user-role  { font-size: .72rem; color: rgba(255,255,255,.4); }
    .btn-logout {
      width: 100%; padding: .55rem;
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25);
      border-radius: 8px; color: #fca5a5;
      font-family: 'DM Sans', sans-serif; font-size: .82rem;
      cursor: pointer; transition: background .15s;
    }
    .btn-logout:hover { background: rgba(239,68,68,.2); }

    /* ── MAIN ─────────────────────────────────────────────────── */
    .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      background: var(--deep);
      border-bottom: 1px solid rgba(26,127,232,.12);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-left { display: flex; align-items: center; gap: 1rem; }
    .topbar-title { font-size: 1.05rem; font-weight: 600; }
    .btn-new {
      padding: .55rem 1.1rem;
      background: linear-gradient(135deg, var(--vivid), var(--accent));
      border: none; border-radius: 8px;
      color: white; font-family: 'DM Sans', sans-serif;
      font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s, box-shadow .15s;
    }
    .btn-new:hover { opacity: .9; box-shadow: 0 4px 16px rgba(26,127,232,.4); }

    .content { padding: 2rem; }

    /* ── FILTROS ──────────────────────────────────────────────── */
    .filters {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .filter-btn {
      padding: .4rem .9rem;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(26,127,232,.15);
      border-radius: 999px;
      color: rgba(255,255,255,.55);
      font-family: 'DM Sans', sans-serif; font-size: .82rem;
      cursor: pointer; transition: all .15s;
    }
    .filter-btn:hover, .filter-btn.is-active {
      background: rgba(26,127,232,.2);
      border-color: var(--vivid); color: white;
    }
    .search-input {
      margin-left: auto;
      padding: .4rem .9rem;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(26,127,232,.15);
      border-radius: 8px; color: white;
      font-family: 'DM Sans', sans-serif; font-size: .85rem;
      outline: none; min-width: 220px;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--vivid); }
    .search-input::placeholder { color: rgba(255,255,255,.25); }

    /* ── TABLA DE POSTS ───────────────────────────────────────── */
    .posts-panel {
      background: var(--deep);
      border: 1px solid rgba(26,127,232,.15);
      border-radius: 14px; overflow: hidden;
    }
    .posts-table { width: 100%; border-collapse: collapse; }
    .posts-table th {
      padding: .8rem 1.25rem;
      text-align: left; font-size: .72rem; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      color: rgba(255,255,255,.3);
      border-bottom: 1px solid rgba(26,127,232,.1);
      background: rgba(0,0,0,.15);
    }
    .posts-table td {
      padding: .95rem 1.25rem; font-size: .85rem;
      color: rgba(255,255,255,.75);
      border-bottom: 1px solid rgba(26,127,232,.06);
      vertical-align: middle;
    }
    .posts-table tr:last-child td { border-bottom: none; }
    .posts-table tr:hover td { background: rgba(26,127,232,.04); }

    .post-title { font-weight: 600; color: white; margin-bottom: .2rem; }
    .post-excerpt { font-size: .78rem; color: rgba(255,255,255,.35); }

    .cat-badge {
      display: inline-block;
      padding: .2rem .6rem;
      background: rgba(26,127,232,.15);
      color: #7dc8f7; border-radius: 6px;
      font-size: .72rem; font-weight: 600;
    }

    .status-badge {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .2rem .6rem; border-radius: 999px;
      font-size: .72rem; font-weight: 600;
    }
    .status-badge--published { background: rgba(34,197,94,.15); color: #4ade80; }
    .status-badge--draft     { background: rgba(255,255,255,.08); color: rgba(255,255,255,.4); }
    .status-badge::before    { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; }

    .actions-cell { display: flex; gap: .4rem; }
    .btn-action {
      padding: .3rem .65rem;
      border-radius: 6px; font-size: .75rem; font-weight: 600;
      cursor: pointer; border: 1px solid transparent;
      font-family: 'DM Sans', sans-serif; transition: all .15s;
    }
    .btn-edit   { background: rgba(26,127,232,.15); color: #7dc8f7; border-color: rgba(26,127,232,.25); }
    .btn-edit:hover   { background: rgba(26,127,232,.3); }
    .btn-toggle { background: rgba(34,197,94,.1);  color: #4ade80;  border-color: rgba(34,197,94,.2); }
    .btn-toggle.is-published { background: rgba(255,255,255,.06); color: rgba(255,255,255,.4); border-color: rgba(255,255,255,.1); }
    .btn-toggle:hover { opacity: .8; }
    .btn-delete { background: rgba(239,68,68,.1);  color: #fca5a5; border-color: rgba(239,68,68,.2); }
    .btn-delete:hover { background: rgba(239,68,68,.25); }

    .empty-state { padding: 4rem 2rem; text-align: center; color: rgba(255,255,255,.3); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: .35; }
    .empty-state a { color: var(--vivid); text-decoration: none; }

    /* ── MODAL ────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(8px);
      z-index: 500;
      align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.is-open { display: flex; }

    .modal {
      background: var(--deep);
      border: 1px solid rgba(26,127,232,.25);
      border-radius: 18px;
      width: 100%; max-width: 680px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
      animation: modalIn .25s ease;
    }
    @keyframes modalIn { from { opacity:0; transform:translateY(12px) scale(.97); } }

    .modal-header {
      padding: 1.5rem 1.75rem 1.25rem;
      border-bottom: 1px solid rgba(26,127,232,.12);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0;
      background: var(--deep); z-index: 1;
    }
    .modal-title { font-size: 1.1rem; font-weight: 700; }
    .btn-close {
      width: 32px; height: 32px;
      background: rgba(255,255,255,.06);
      border: none; border-radius: 8px;
      color: rgba(255,255,255,.6); font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .btn-close:hover { background: rgba(255,255,255,.12); }

    .modal-body { padding: 1.5rem 1.75rem; }

    .form-group { margin-bottom: 1.1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    label {
      display: block; color: rgba(255,255,255,.5);
      font-size: .78rem; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: .4rem;
    }
    input[type="text"], input[type="email"], select, textarea {
      width: 100%; padding: .75rem .9rem;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(26,127,232,.2);
      border-radius: 9px; color: white;
      font-family: 'DM Sans', sans-serif; font-size: .9rem;
      outline: none; transition: border-color .15s, background .15s;
    }
    input[type="text"]:focus, select:focus, textarea:focus {
      border-color: var(--vivid); background: rgba(26,127,232,.08);
    }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,.2); }
    select option { background: var(--deep); }
    textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

    .toggle-group {
      display: flex; align-items: center; gap: .75rem;
    }
    .toggle {
      position: relative; width: 42px; height: 24px;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(26,127,232,.2);
      border-radius: 999px; transition: background .2s;
    }
    .toggle input:checked ~ .toggle-track {
      background: var(--success);
      border-color: var(--success);
    }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: white; border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked ~ .toggle-track .toggle-thumb {
      transform: translateX(18px);
    }
    .toggle-label { font-size: .85rem; color: rgba(255,255,255,.65); }

    .modal-footer {
      padding: 1.25rem 1.75rem;
      border-top: 1px solid rgba(26,127,232,.1);
      display: flex; align-items: center; justify-content: flex-end; gap: .75rem;
    }
    .btn-cancel {
      padding: .6rem 1.2rem;
      background: transparent; border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px; color: rgba(255,255,255,.55);
      font-family: 'DM Sans', sans-serif; font-size: .88rem;
      cursor: pointer; transition: all .15s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,.06); color: white; }
    .btn-save {
      padding: .6rem 1.4rem;
      background: linear-gradient(135deg, var(--vivid), var(--accent));
      border: none; border-radius: 8px; color: white;
      font-family: 'DM Sans', sans-serif; font-size: .88rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s, box-shadow .15s;
    }
    .btn-save:hover { opacity: .9; box-shadow: 0 4px 16px rgba(26,127,232,.4); }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }

    /* Toast notification */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      padding: .85rem 1.25rem;
      border-radius: 10px; font-size: .88rem; font-weight: 500;
      z-index: 999; transform: translateY(80px); opacity: 0;
      transition: transform .3s, opacity .3s;
      display: flex; align-items: center; gap: .6rem;
      max-width: 320px; box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }
    .toast.is-visible { transform: translateY(0); opacity: 1; }
    .toast--success { background: rgba(34,197,94,.2); border: 1px solid rgba(34,197,94,.4); color: #4ade80; }
    .toast--error   { background: rgba(239,68,68,.2);  border: 1px solid rgba(239,68,68,.4);  color: #fca5a5; }

    /* Confirm dialog */
    .confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
      z-index: 600; align-items: center; justify-content: center;
    }
    .confirm-overlay.is-open { display: flex; }
    .confirm-box {
      background: var(--deep); border: 1px solid rgba(239,68,68,.3);
      border-radius: 14px; padding: 2rem; max-width: 360px; width: 90%;
      text-align: center; animation: modalIn .2s ease;
    }
    .confirm-icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .confirm-title { font-size: 1rem; font-weight: 700; margin-bottom: .5rem; }
    .confirm-msg   { font-size: .85rem; color: rgba(255,255,255,.5); margin-bottom: 1.5rem; }
    .confirm-btns  { display: flex; gap: .75rem; justify-content: center; }
    .btn-confirm-cancel {
      padding: .55rem 1.2rem; background: transparent;
      border: 1px solid rgba(255,255,255,.15); border-radius: 8px;
      color: rgba(255,255,255,.55); font-family: 'DM Sans', sans-serif;
      font-size: .88rem; cursor: pointer;
    }
    .btn-confirm-ok {
      padding: .55rem 1.2rem;
      background: rgba(239,68,68,.2); border: 1px solid rgba(239,68,68,.4);
      border-radius: 8px; color: #fca5a5;
      font-family: 'DM Sans', sans-serif; font-size: .88rem;
      cursor: pointer; font-weight: 600;
    }
    .btn-confirm-ok:hover { background: rgba(239,68,68,.35); }
  </style>
</head>
<body>

  <!-- ── SIDEBAR ─────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">🦴</div>
      <div class="sidebar-brand-text">
        <strong>Dr. Ancona</strong>
        <span>Panel Admin</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">General</div>
      <a class="nav-item" href="dashboard.html">
        <span class="nav-item-icon">📊</span> Dashboard
      </a>
      <div class="nav-section-title" style="margin-top:.75rem">Contenido</div>
      <a class="nav-item is-active" href="blog.html">
        <span class="nav-item-icon">✍️</span> Blog
      </a>
      <div class="nav-section-title" style="margin-top:.75rem">Próximamente</div>
      <span class="nav-item" style="opacity:.4;cursor:not-allowed">
        <span class="nav-item-icon">📅</span> Citas
      </span>
      <span class="nav-item" style="opacity:.4;cursor:not-allowed">
        <span class="nav-item-icon">👤</span> Pacientes
      </span>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">👨‍⚕️</div>
        <div>
          <div class="user-name" id="user-name">Cargando...</div>
          <div class="user-role">Administrador</div>
        </div>
      </div>
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
  </aside>

  <!-- ── MAIN ───────────────────────────────────────────────── -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">Blog</span>
      </div>
      <button class="btn-new" id="btn-new-post">+ Nuevo artículo</button>
    </div>

    <div class="content">
      <!-- Filtros -->
      <div class="filters">
        <button class="filter-btn is-active" data-filter="all">Todos</button>
        <button class="filter-btn" data-filter="published">Publicados</button>
        <button class="filter-btn" data-filter="draft">Borradores</button>
        <input type="text" class="search-input" id="search-input" placeholder="🔍  Buscar artículo...">
      </div>

      <!-- Tabla -->
      <div class="posts-panel">
        <div id="posts-container">
          <div class="empty-state"><div class="icon">⏳</div>Cargando artículos...</div>
        </div>
      </div>
    </div>
  </main>

  <!-- ── MODAL CREAR/EDITAR ─────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Nuevo artículo</span>
        <button class="btn-close" id="btn-modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="f-title">Título *</label>
          <input type="text" id="f-title" placeholder="Título del artículo" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-category">Categoría</label>
            <select id="f-category">
              <option value="">Sin categoría</option>
              <option value="Columna Vertebral">Columna Vertebral</option>
              <option value="Traumatología">Traumatología</option>
              <option value="Rehabilitación">Rehabilitación</option>
              <option value="Prevención">Prevención</option>
              <option value="Cirugía Mínimamente Invasiva">Cirugía Mínimamente Invasiva</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-author">Autor</label>
            <input type="text" id="f-author" placeholder="Dr. Angel M. Ancona Pérez" />
          </div>
        </div>
        <div class="form-group">
          <label for="f-excerpt">Resumen</label>
          <textarea id="f-excerpt" rows="2" placeholder="Breve descripción del artículo (máx. 200 caracteres)"></textarea>
        </div>
        <div class="form-group">
          <label for="f-content">Contenido</label>
          <textarea id="f-content" rows="8" placeholder="Contenido completo del artículo..."></textarea>
        </div>
        <div class="form-group">
          <div class="toggle-group">
            <label class="toggle">
              <input type="checkbox" id="f-published" />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </label>
            <span class="toggle-label">Publicar inmediatamente</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btn-modal-cancel">Cancelar</button>
        <button class="btn-save" id="btn-modal-save">Guardar artículo</button>
      </div>
    </div>
  </div>

  <!-- ── CONFIRM DELETE ─────────────────────────────────────── -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-icon">🗑️</div>
      <div class="confirm-title">¿Eliminar artículo?</div>
      <div class="confirm-msg">Esta acción no se puede deshacer. El artículo se eliminará permanentemente.</div>
      <div class="confirm-btns">
        <button class="btn-confirm-cancel" id="btn-confirm-cancel">Cancelar</button>
        <button class="btn-confirm-ok" id="btn-confirm-ok">Sí, eliminar</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ──────────────────────────────────────────────── -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── Supabase config ────────────────────────────────────────────
    const SUPABASE_URL  = 'https://ithwmacwyexinxjtnbcg.supabase.co'; // TODO
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0aHdtYWN3eWV4aW54anRuYmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTYyNTYsImV4cCI6MjA4ODU5MjI1Nn0.WbG3MkP7xvI64V5Ip_GEBkKpVIMs-D8e7fOGB8eePfE';                     // TODO
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON);

    // ── Estado ────────────────────────────────────────────────────
    let allPosts     = [];
    let currentFilter = 'all';
    let editingId     = null;
    let deleteId      = null;

    // ── Auth guard ─────────────────────────────────────────────────
    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      document.getElementById('user-name').textContent = session.user.email.split('@')[0];
      await loadPosts();
      // Abrir modal de nuevo artículo si viene de la URL
      if (new URLSearchParams(location.search).get('action') === 'new') openModal();
    })();

    // ── Logout ─────────────────────────────────────────────────────
    document.getElementById('btn-logout').addEventListener('click', async () => {
      await db.auth.signOut();
      window.location.href = 'login.html';
    });

    // ── Cargar posts ───────────────────────────────────────────────
    async function loadPosts() {
      try {
        const { data, error } = await db
          .from('blog_posts')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) throw error;
        allPosts = data;
        renderPosts();
      } catch (err) {
        showToast('Error cargando artículos.', 'error');
      }
    }

    // ── Renderizar tabla ───────────────────────────────────────────
    function renderPosts() {
      const query  = document.getElementById('search-input').value.toLowerCase();
      const filtered = allPosts.filter(p => {
        const matchFilter =
          currentFilter === 'all' ||
          (currentFilter === 'published' && p.published) ||
          (currentFilter === 'draft' && !p.published);
        const matchSearch = !query || p.title.toLowerCase().includes(query) ||
          (p.category || '').toLowerCase().includes(query);
        return matchFilter && matchSearch;
      });

      const container = document.getElementById('posts-container');

      if (!filtered.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📝</div>
            No hay artículos que coincidan.<br>
            <a href="#" onclick="openModal();return false">Crea el primero →</a>
          </div>`;
        return;
      }

      const rows = filtered.map(p => `
        <tr>
          <td style="max-width:320px">
            <div class="post-title">${escapeHtml(p.title)}</div>
            <div class="post-excerpt">${escapeHtml((p.excerpt || '').slice(0, 80))}${(p.excerpt || '').length > 80 ? '…' : ''}</div>
          </td>
          <td><span class="cat-badge">${escapeHtml(p.category || 'Sin categoría')}</span></td>
          <td>
            <span class="status-badge status-badge--${p.published ? 'published':'draft'}">
              ${p.published ? 'Publicado' : 'Borrador'}
            </span>
          </td>
          <td>${new Date(p.created_at).toLocaleDateString('es-MX')}</td>
          <td>
            <div class="actions-cell">
              <button class="btn-action btn-edit"   onclick="openEdit('${p.id}')">✏️ Editar</button>
              <button class="btn-action btn-toggle ${p.published ? 'is-published':''}"
                onclick="togglePost('${p.id}', ${p.published})">
                ${p.published ? '⬇️ Borrador' : '⬆️ Publicar'}
              </button>
              <button class="btn-action btn-delete" onclick="confirmDelete('${p.id}')">🗑️</button>
            </div>
          </td>
        </tr>`).join('');

      container.innerHTML = `
        <table class="posts-table">
          <thead>
            <tr>
              <th>Artículo</th>
              <th>Categoría</th>
              <th>Estado</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // ── Filtros ────────────────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        currentFilter = btn.dataset.filter;
        renderPosts();
      });
    });
    document.getElementById('search-input').addEventListener('input', renderPosts);

    // ── Modal ──────────────────────────────────────────────────────
    function openModal(post = null) {
      editingId = post ? post.id : null;
      document.getElementById('modal-title').textContent = post ? 'Editar artículo' : 'Nuevo artículo';
      document.getElementById('f-title').value     = post?.title    || '';
      document.getElementById('f-category').value  = post?.category || '';
      document.getElementById('f-author').value    = post?.author   || 'Dr. Angel M. Ancona Pérez';
      document.getElementById('f-excerpt').value   = post?.excerpt  || '';
      document.getElementById('f-content').value   = post?.content  || '';
      document.getElementById('f-published').checked = post?.published || false;
      document.getElementById('modal-overlay').classList.add('is-open');
      document.getElementById('f-title').focus();
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('is-open');
      editingId = null;
    }

    function openEdit(id) {
      const post = allPosts.find(p => p.id === id);
      if (post) openModal(post);
    }

    document.getElementById('btn-new-post').addEventListener('click', () => openModal());
    document.getElementById('btn-modal-close').addEventListener('click', closeModal);
    document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    // ── Guardar post ───────────────────────────────────────────────
    document.getElementById('btn-modal-save').addEventListener('click', async () => {
      const title = document.getElementById('f-title').value.trim();
      if (!title) { showToast('El título es requerido.', 'error'); return; }

      const payload = {
        title,
        category:  document.getElementById('f-category').value,
        author:    document.getElementById('f-author').value.trim() || 'Dr. Angel M. Ancona Pérez',
        excerpt:   document.getElementById('f-excerpt').value.trim(),
        content:   document.getElementById('f-content').value.trim(),
        published: document.getElementById('f-published').checked,
        updated_at: new Date().toISOString(),
      };

      const btn = document.getElementById('btn-modal-save');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      try {
        if (editingId) {
          const { error } = await db.from('blog_posts').update(payload).eq('id', editingId);
          if (error) throw error;
          showToast('✅ Artículo actualizado', 'success');
        } else {
          const { error } = await db.from('blog_posts')
            .insert([{ ...payload, created_at: new Date().toISOString() }]);
          if (error) throw error;
          showToast('✅ Artículo creado', 'success');
        }
        closeModal();
        await loadPosts();
      } catch (err) {
        showToast('Error al guardar: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar artículo';
      }
    });

    // ── Toggle publicado ───────────────────────────────────────────
    async function togglePost(id, currentState) {
      try {
        const { error } = await db
          .from('blog_posts')
          .update({ published: !currentState, updated_at: new Date().toISOString() })
          .eq('id', id);
        if (error) throw error;
        showToast(currentState ? 'Movido a borradores' : '✅ Artículo publicado', 'success');
        await loadPosts();
      } catch (err) {
        showToast('Error al cambiar estado.', 'error');
      }
    }

    // ── Eliminar post ──────────────────────────────────────────────
    function confirmDelete(id) {
      deleteId = id;
      document.getElementById('confirm-overlay').classList.add('is-open');
    }
    document.getElementById('btn-confirm-cancel').addEventListener('click', () => {
      document.getElementById('confirm-overlay').classList.remove('is-open');
      deleteId = null;
    });
    document.getElementById('btn-confirm-ok').addEventListener('click', async () => {
      document.getElementById('confirm-overlay').classList.remove('is-open');
      if (!deleteId) return;
      try {
        const { error } = await db.from('blog_posts').delete().eq('id', deleteId);
        if (error) throw error;
        showToast('Artículo eliminado', 'success');
        await loadPosts();
      } catch (err) {
        showToast('Error al eliminar.', 'error');
      } finally { deleteId = null; }
    });

    // ── Toast ──────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast toast--${type} is-visible`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('is-visible'), 3500);
    }

    // ── Helpers ────────────────────────────────────────────────────
    function escapeHtml(str = '') {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
  </script>
</body>
</html>
